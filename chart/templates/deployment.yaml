apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "service-deployment.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.deployment.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "service-deployment.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "service-deployment.selectorLabels" . | nindent 8 }}
        app_id: {{ include "service-deployment.appId" . }}
    spec:
      enableServiceLinks: {{ default false .Values.enableServiceLinks }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if .Values.serviceAccountName }}
      serviceAccountName: {{ .Values.serviceAccountName }}
      {{- else if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Release.Name }}
      {{- end }}
      {{- if .Values.image.pullSecret }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      {{- end }}
      {{- if .Values.securityContext.enabled }}
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
        seccompProfile:
          type: {{ .Values.securityContext.seccompProfile }}
      {{- end }}
      {{- if .Values.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.topologySpread.maxSkew }}
          topologyKey: {{ .Values.topologySpread.topologyKey }}
          whenUnsatisfiable: {{ .Values.topologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "service-deployment.selectorLabels" . | nindent 14 }}
      {{- end }}
      containers:
        - name: {{ .Release.Name }}
          image: {{ .Values.image.registry }}/{{ .Values.image.app }}/{{ .Values.image.service }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.securityContext.enabled }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
            {{- if .Values.securityContext.dropAllCapabilities }}
            capabilities:
              drop:
                - ALL
            {{- end }}
            seccompProfile:
              type: {{ .Values.securityContext.seccompProfile }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.container.port }}
            - name: metrics
              containerPort: {{ .Values.container.metricsPort }}
          {{- if .Values.resources }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            {{- if .Values.resources.limits }}
            limits:
              # cpu limit intentionally omitted (avoid CFS throttling on bursty Go workloads)
              memory: {{ .Values.resources.limits.memory }}
            {{- end }}
          {{- end }}
          {{- if .Values.probes.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: {{ .Values.probes.port }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.probes.port }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.probes.port }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if and (eq .Values.lifecycle.preStopMode "nativeSleep") (gt (int .Values.lifecycle.preStopSleepSeconds) 0) }}
          lifecycle:
            preStop:
              sleep:
                seconds: {{ .Values.lifecycle.preStopSleepSeconds }}
          {{- end }}
          {{- $tmp := and .Values.securityContext.enabled .Values.securityContext.readOnlyRootFilesystem .Values.writableTmp }}
          {{- if or $tmp .Values.volumeMounts }}
          volumeMounts:
            {{- if $tmp }}
            - name: tmp
              mountPath: /tmp
            {{- end }}
            {{- if .Values.volumeMounts }}
            {{- toYaml .Values.volumeMounts | nindent 12 }}
            {{- end }}
          {{- end }}
          env:
            - name: APP_PORT
              value: {{ .Values.container.port | quote }}
            - name: METRICS_PORT
              value: {{ .Values.container.metricsPort | quote }}
            - name: HOST
              value: {{ .Values.host | quote }}
            - name: ENV
              value: {{ default "" .Values.environment | quote }}
            {{- if .Values.ingress.enabled }}
            - name: SWAGGER_BASE_PATH
              value: {{ default "" .Values.ingress.path | quote }}
            - name: SWAGGER_SCHEMES
              value: {{ if or (eq .Values.environment "dev") (eq .Values.environment "staging") }}"https"{{ else }}"http"{{ end }}
            {{- end }}
            {{- if .Values.envVars }}
            {{- range $env := .Values.envVars }}
            {{- if $env.valueFrom }}
            - name: {{ $env.name }}
              valueFrom:
                {{- toYaml $env.valueFrom | nindent 16 }}
            {{- else }}
            - name: {{ $env.name }}
              value: {{ $env.value | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.secretEnvVars }}
            {{- range $secret := .Values.secretEnvVars }}
            - name: {{ $secret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secret.secretName }}
                  key: {{ $secret.secretKey }}
            {{- end }}
            {{- end }}
      {{- $tmpVol := and .Values.securityContext.enabled .Values.securityContext.readOnlyRootFilesystem .Values.writableTmp }}
      {{- if or $tmpVol .Values.volumes }}
      volumes:
        {{- if $tmpVol }}
        - name: tmp
          emptyDir: {}
        {{- end }}
        {{- if .Values.volumes }}
        {{- toYaml .Values.volumes | nindent 8 }}
        {{- end }}
      {{- end }}
