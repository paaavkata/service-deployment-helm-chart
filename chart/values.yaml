## Top-level values for the shared service-deployment chart.
##
## Consumed as a subchart aliased `parent`; a service sets these under a
## `parent:` block in its own helm/values.yaml. Defaults below are subchart defaults.
##
## HARDENING ROLLOUT: every new hardening feature (probes, securityContext,
## PodDisruptionBudget, HPA, topologySpread, ServiceMonitor) is GATED behind an
## `enabled` flag defaulting to false, so services opt in one at a time.

environment: dev
host: file-convert.online
enableServiceLinks: false

image:
  registry: 929572853995.dkr.ecr.eu-west-1.amazonaws.com
  app: file-convert/app
  service: example-service
  tag: latest
  pullPolicy: Always
  pullSecret: ""

serviceAccount:
  create: false
  namespace: ""

# If set, the Deployment references this existing ServiceAccount (e.g. from a separate RBAC chart)
serviceAccountName: ""

# --- ports ---
container:
  port: 8080          # business API (APP_PORT)
  metricsPort: 9090   # observability (METRICS_PORT) — health + /metrics, NOT via ingress
  host: 127.0.0.1

service:
  port: 80
  type: ClusterIP

# --- availability ---
deployment:
  replicas: 2

ingress:
  enabled: true
  path: /api/example
  stripPrefix: true
  mainHostRecord: true
  gatewayPluginEnabled: false
  # Namespace of the traefik-gateway-plugin Middleware CRD (empty = same namespace).
  gatewayPluginNamespace: ""

# --- probes (gated; flip on per-service after go-server wiring) ---
probes:
  enabled: false
  port: metrics                  # named container port the probes target (9090)
  startup:
    path: /startupz
    periodSeconds: 5
    failureThreshold: 30         # up to ~150s for slow migrations
  liveness:
    path: /livez
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /readyz
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

# --- graceful shutdown ---
terminationGracePeriodSeconds: 30
lifecycle:
  # preStopMode: none | nativeSleep
  #   none        -> no preStop; draining handled in-process by go-server ReadinessDrainWait
  #                  (correct for FROM scratch images: no shell/sleep binary to exec)
  #   nativeSleep -> emit the binary-free native `sleep` action (requires k8s >= 1.30)
  preStopMode: none
  preStopSleepSeconds: 5

# --- securityContext (gated) ---
securityContext:
  enabled: false
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  seccompProfile: RuntimeDefault
  dropAllCapabilities: true
writableTmp: true                # mount an emptyDir at /tmp when readOnlyRootFilesystem is on

# --- resources: requests always; memory limit; NO cpu limit (anti-throttle) ---
resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 128Mi                # cpu intentionally omitted

# --- PodDisruptionBudget (gated; meaningful only with replicas >= 2) ---
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# --- HorizontalPodAutoscaler (gated). When enabled, the Deployment omits replicas. ---
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80

# --- topology spread (gated) ---
topologySpread:
  enabled: false
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

# --- Prometheus Operator scrape (gated) ---
serviceMonitor:
  enabled: false
  interval: 30s
  path: /metrics
  namespaceSelector: {}          # defaults to release namespace
  labels: {}                     # match your Prometheus serviceMonitorSelector

envVars:
  - name: ENV
    value: dev
  - name: HOST
    value: file-convert.online
  - name: EMAIL_SERVICE_URL
    value: http://email-service/send-email

# Platform attribution label (SERVICEMONITOR.md §4). Defaults to the release
# name; override only if the app_id must differ from the k8s release name.
appId: ""
